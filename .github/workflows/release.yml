name: Build & Release

on:
  release:
    types: [published]

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            artifact: openapi-mcp-linux-x64
          - target: bun-linux-arm64
            artifact: openapi-mcp-linux-arm64
          - target: bun-darwin-x64
            artifact: openapi-mcp-darwin-x64
          - target: bun-darwin-arm64
            artifact: openapi-mcp-darwin-arm64
          - target: bun-windows-x64
            artifact: openapi-mcp-windows-x64.exe

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Compile binary
        run: bun build src/index.ts --compile --target ${{ matrix.target }} --outfile ${{ matrix.artifact }}

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} ${{ matrix.artifact }} --clobber
